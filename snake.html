<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Змейка</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f3; }
        .game-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); text-align: center; display: flex; flex-direction: column; align-items: center; }
        .scoreboard { display: flex; gap: 40px; margin-bottom: 15px; font-size: 18px; font-weight: bold; color: #333; }
        canvas { background: #1a1a1a; border: 4px solid #333; border-radius: 6px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .controls-hint { margin-top: 15px; font-size: 14px; color: #666; }
        button { display: none; margin-top: 15px; padding: 10px 24px; border: none; border-radius: 6px; background: #28a745; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>Игра Змейка</h2>
    
    <div class="scoreboard">
        <div>Счет: <span id="currentScore">0</span></div>
        <div>Рекорд: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <button id="restartBtn">Играть снова</button>
    <p class="controls-hint">Используйте <b>Стрелочки</b> или <b>WASD</b> для управления</p>
</div>

<script src="snake.js"></script>
</body>
</html>
