<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .game-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); text-align: center; max-width: 350px; width: 100%; }
        .scoreboard { display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 16px; font-weight: bold; background: #e9ecef; padding: 8px; border-radius: 6px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 8px; justify-content: center; margin: 20px 0; }
        .cell { width: 100px; height: 100px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 8px; font-size: 36px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease; user-select: none; }
        .cell:hover { background: #e9ecef; }
        .cell.x { color: #dc3545; }
        .cell.o { color: #007bff; }
        .status { font-size: 18px; font-weight: bold; min-height: 27px; margin-bottom: 15px; color: #495057; }
        button { padding: 10px 24px; border: none; border-radius: 6px; background: #28a745; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; width: 100%; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>Крестики-Нолики</h2>
    
    <div class="scoreboard">
        <div>Вы (X): <span id="scorePlayer">0</span></div>
        <div>Бот (O): <span id="scoreBot">0</span></div>
    </div>

    <div class="status" id="statusField">Ваш ход!</div>

    <div class="board" id="gameBoard">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="resetBtn">Играть снова</button>
</div>

<!-- Подключение внешнего JS файла в самом конце body гарантирует безопасность загрузки -->
<script src="script.js"></script>
</body>
</html>
