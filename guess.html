<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Number</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: sans-serif;
    background: #222;
    color: white;
  }
  h1 {
    margin-bottom: 10px;
  }
  input, button {
    padding: 8px 12px;
    font-size: 16px;
    margin: 5px;
  }
  #message {
    margin-top: 10px;
    font-size: 18px;
  }
</style>
</head>
<body>
<div class="game-card">
    <h2>Угадай число от 1 до 100</h2>
    <p>Осталось попыток: <span id="attempts">7</span></p>
    
    <div id="controls">
        <input id="guessInput" type="number" min="1" max="100">
        <button id="guessBtn">Угадать</button>
    </div>

    <button id="restartBtn" style="display: none;">Играть снова</button>
    <div id="message" class="text-info">Удачи!</div>
</div>


<script src = "guess.js"></script>
</body>
</html>
