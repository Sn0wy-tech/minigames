<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Сапер</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f3; user-select: none; }
        .game-container { background: #bdbdbd; padding: 15px; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 3px solid #fff; border-bottom-color: #7b7b7b; border-right-color: #7b7b7b; text-align: center; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #bdbdbd; padding: 10px; margin-bottom: 15px; border: 3px solid #7b7b7b; border-bottom-color: #fff; border-right-color: #fff; }
        .display-box { background: black; color: red; font-family: 'Courier New', Courier, monospace; font-size: 26px; font-weight: bold; padding: 2px 8px; border-radius: 3px; border: 2px solid #7b7b7b; min-width: 50px; text-align: right; }
        .face-btn { font-size: 24px; padding: 2px 8px; cursor: pointer; border: 3px solid #fff; border-bottom-color: #7b7b7b; border-right-color: #7b7b7b; background: #bdbdbd; outline: none; }
        .face-btn:active { border: 3px solid #7b7b7b; border-bottom-color: #fff; border-right-color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(9, 32px); grid-template-rows: repeat(9, 32px); gap: 1px; background: #7b7b7b; border: 3px solid #7b7b7b; border-bottom-color: #fff; border-right-color: #fff; }
        .cell { width: 32px; height: 32px; background: #bdbdbd; border: 3px solid #fff; border-bottom-color: #7b7b7b; border-right-color: #7b7b7b; box-sizing: border-box; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; cursor: pointer; }
        .cell.revealed { background: #d9d9d9; border: 1px solid #7b7b7b; }
        .cell.mine { background: #dc3545; }
        /* Traditional Minesweeper color scheme for counts */
        .n-1 { color: blue; }
        .n-2 { color: green; }
        .n-3 { color: red; }
        .n-4 { color: darkblue; }
        .n-5 { color: maroon; }
        .n-6 { color: turquoise; }
        .n-7 { color: black; }
        .n-8 { color: gray; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-bar">
        <div class="display-box" id="mineCounter">010</div>
        <button class="face-btn" id="faceBtn">🙂</button>
        <div class="display-box" id="timerBox">000</div>
    </div>

    <div class="grid" id="mineGrid"></div>
</div>

<script src="saper.js"></script>
</body>
</html>
